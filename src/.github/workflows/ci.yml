name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Download modules
        run: go mod download
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build multichecker
        run: go build -v ./cmd/loglint
      - name: Build go-plugin
        run: go build -buildmode=plugin -o bin/loglint.so ./plugin
      - name: Build module-plugin package
        run: go build -v ./moduleplugin
