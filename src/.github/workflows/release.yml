name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build standalone checker
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o dist/loglint-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/loglint
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: loglint-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  build-plugin-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build golangci-lint go plugin
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 \
            go build -trimpath -buildmode=plugin -o dist/loglint-linux-amd64.so ./plugin
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: loglint-linux-amd64-so
          path: dist/loglint-linux-amd64.so

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-release-assets
      - build-plugin-linux
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
